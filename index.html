<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#050410">
<title>Spell Forge — Word RPG</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9A%94%EF%B8%8F%3C/text%3E%3C/svg%3E">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#000;min-height:100vh;font-family:'Crimson Text',serif;display:flex;align-items:center;justify-content:center;overscroll-behavior:none}
.frame{position:relative;width:400px;height:820px;overflow:hidden;border-radius:28px;background:#050410;box-shadow:0 25px 80px rgba(88,28,200,.25),0 0 0 1px rgba(140,100,255,.18)}
@media (max-width:420px){.frame{width:100vw;height:100vh;border-radius:0}}
.screen{position:absolute;inset:0;overflow:hidden;opacity:0;pointer-events:none;transition:opacity .5s}
.screen.on{opacity:1;pointer-events:auto}
.bg{position:absolute;inset:0;z-index:0;overflow:hidden}
.bg-layer{position:absolute;left:-10%;right:-10%;will-change:transform}
@keyframes drift{0%,100%{transform:translateX(0)}50%{transform:translateX(-10px)}}
@keyframes drift2{0%,100%{transform:translateX(0)}50%{transform:translateX(12px)}}
@keyframes drift3{0%,100%{transform:translateX(0)}50%{transform:translateX(-6px)}}
@keyframes flicker{0%,100%{opacity:.55}50%{opacity:.85}}
@keyframes fog{0%{transform:translateX(-20%)}100%{transform:translateX(20%)}}
.l-sky{top:0;height:55%;z-index:1}
.l-mid{top:30%;height:50%;z-index:2;animation:drift 9s ease-in-out infinite}
.l-near{top:50%;height:40%;z-index:3;animation:drift2 7s ease-in-out infinite}
.fog{position:absolute;inset:0;z-index:3;background:radial-gradient(ellipse at 50% 80%,rgba(200,180,255,.08),transparent 60%);animation:fog 18s linear infinite alternate;pointer-events:none}
.title{position:relative;z-index:6;font-family:'Cinzel',serif;font-size:10px;font-weight:700;letter-spacing:4px;text-align:center;padding:12px 0 5px;text-transform:uppercase}
.sound-btn{position:absolute;top:10px;right:14px;z-index:10;width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#c4b5fd;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;-webkit-tap-highlight-color:transparent}
.sound-btn:hover{background:rgba(255,255,255,.15)}
.battle-ui{position:relative;z-index:5;padding:0 12px;color:#e9e6ff}
.mrow{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;padding:0 2px}
.mname{font-family:'Cinzel',serif;font-size:16px;font-weight:700;line-height:1.1;text-shadow:0 2px 8px rgba(0,0,0,.8)}
.msub{font-size:11px;color:rgba(255,255,255,.5);margin-top:2px}
.hplabel{font-size:10px;color:rgba(255,255,255,.55);text-shadow:0 1px 3px rgba(0,0,0,.8)}
.hpt{height:8px;background:rgba(0,0,0,.55);border-radius:5px;overflow:hidden;border:1px solid rgba(255,255,255,.08)}
.hpf{height:100%;border-radius:5px;transition:width .4s,background .4s}
.atk-track{height:3px;background:rgba(0,0,0,.5);border-radius:2px;overflow:hidden;margin-top:2px}
.atk-fill{height:100%;background:#ef4444;border-radius:2px;box-shadow:0 0 6px #ef4444}
.arena{display:flex;justify-content:center;align-items:flex-end;height:200px;position:relative;perspective:700px;margin-top:2px}
@keyframes gobIdle{0%{transform:perspective(700px) rotateY(-12deg) translateY(0) scale(1)}25%{transform:perspective(700px) rotateY(14deg) translateY(-10px) scale(1.02)}50%{transform:perspective(700px) rotateY(-5deg) translateY(-4px) scale(1)}75%{transform:perspective(700px) rotateY(10deg) translateY(-9px) scale(1.01)}100%{transform:perspective(700px) rotateY(-12deg) translateY(0) scale(1)}}
@keyframes golIdle{0%,100%{transform:perspective(700px) rotateY(-8deg) translateY(0)}50%{transform:perspective(700px) rotateY(8deg) translateY(-4px)}}
@keyframes draIdle{0%{transform:perspective(700px) rotateY(-18deg) translateY(0) scale(1)}50%{transform:perspective(700px) rotateY(16deg) translateY(-14px) scale(1.05)}100%{transform:perspective(700px) rotateY(-18deg) translateY(0) scale(1)}}
@keyframes mHurt{0%{transform:perspective(700px) translateX(0) translateZ(0) scale(1);filter:brightness(1) hue-rotate(0)}10%{transform:perspective(700px) translateX(-16px) translateZ(-30px) scale(.88);filter:brightness(12) saturate(0)}26%{transform:perspective(700px) translateX(14px) translateZ(-10px) scale(.95);filter:brightness(1.5) hue-rotate(-20deg)}50%{transform:perspective(700px) translateX(-6px) translateZ(0) scale(1.01);filter:brightness(1.2)}75%{transform:perspective(700px) translateX(4px) scale(1);filter:brightness(1)}100%{transform:perspective(700px) translateX(0) scale(1);filter:brightness(1)}}
@keyframes mWindup{0%{transform:perspective(700px) translateZ(-20px) rotateX(8deg) scale(.96)}100%{transform:perspective(700px) translateZ(-40px) rotateX(14deg) scale(.92)}}
@keyframes mAtk{0%{transform:perspective(700px) translateZ(-40px) rotateX(14deg) scale(.92)}35%{transform:perspective(700px) translateZ(140px) rotateX(-12deg) scale(1.55);filter:brightness(1.6) saturate(1.4)}60%{transform:perspective(700px) translateZ(80px) rotateX(-6deg) scale(1.3)}100%{transform:perspective(700px) translateZ(0) rotateX(0) scale(1);filter:brightness(1)}}
@keyframes mDefeat{0%{transform:perspective(700px) rotateZ(0) translateY(0) scale(1);opacity:1}40%{transform:perspective(700px) rotateZ(-15deg) translateY(20px) scale(.85);opacity:.7;filter:saturate(.3)}100%{transform:perspective(700px) rotateZ(-35deg) translateY(100px) scale(.5);opacity:0;filter:saturate(0) brightness(.3)}}
@keyframes wingL{0%,100%{transform:rotateY(0) rotateZ(3deg)}50%{transform:rotateY(38deg) rotateZ(-12deg)}}
@keyframes wingR{0%,100%{transform:rotateY(0) rotateZ(-3deg)}50%{transform:rotateY(-38deg) rotateZ(12deg)}}
@keyframes shake{0%,100%{transform:translate(0,0)}20%{transform:translate(-6px,2px)}40%{transform:translate(6px,-2px)}60%{transform:translate(-4px,3px)}80%{transform:translate(4px,-1px)}}
.sprite{display:inline-block;transform-origin:center 85%;will-change:transform;filter:drop-shadow(0 10px 22px var(--ms,#0008)) drop-shadow(0 0 18px var(--mg,rgba(255,100,0,.4)))}
.s-goblin{animation:gobIdle 2.4s ease-in-out infinite}
.s-golem{animation:golIdle 4.5s ease-in-out infinite}
.s-dragon{animation:draIdle 3.5s ease-in-out infinite}
.s-hurt{animation:mHurt .55s ease forwards!important}
.s-wind{animation:mWindup .28s ease forwards!important}
.s-atk{animation:mAtk .58s ease forwards!important}
.s-die{animation:mDefeat 1s ease forwards!important}
.wl{transform-box:fill-box;transform-origin:92% 72%;animation:wingL 1.8s ease-in-out infinite}
.wr{transform-box:fill-box;transform-origin:8% 72%;animation:wingR 1.8s ease-in-out infinite}
.arena.shaking{animation:shake .4s ease}
.fx{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:20}
@keyframes rise{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-140px) scale(.2);opacity:0}}
@keyframes burst{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--bx),var(--by)) scale(.1);opacity:0}}
@keyframes projectile{0%{transform:translate(0,0) scale(.4);opacity:0}10%{opacity:1;transform:translate(0,-10px) scale(.8)}60%{transform:translate(var(--tx),var(--ty)) scale(1.3);opacity:1}100%{transform:translate(var(--tx),var(--ty)) scale(2);opacity:0}}
@keyframes floatNum{0%{transform:translateY(0) scale(1);opacity:1}60%{opacity:1}100%{transform:translateY(-90px) scale(.65);opacity:0}}
@keyframes impact{0%{transform:scale(0);opacity:1}100%{transform:scale(3);opacity:0}}
.part{position:absolute;border-radius:50%;pointer-events:none;animation:burst .8s ease-out forwards}
.spark{position:absolute;width:4px;height:4px;border-radius:50%;background:#fff;box-shadow:0 0 12px currentColor;animation:rise 1.2s ease-out forwards}
.proj{position:absolute;width:28px;height:28px;border-radius:50%;pointer-events:none;animation:projectile .45s ease-out forwards;box-shadow:0 0 24px currentColor,0 0 48px currentColor}
.impact{position:absolute;width:80px;height:80px;border-radius:50%;pointer-events:none;animation:impact .5s ease-out forwards;background:radial-gradient(circle,#fff 0%,var(--ic) 30%,transparent 70%)}
.fdmg{position:absolute;font-family:'Cinzel',serif;font-weight:900;pointer-events:none;animation:floatNum 1.5s ease-out forwards;text-shadow:0 0 14px currentColor,0 2px 6px rgba(0,0,0,.9);white-space:nowrap}
.flash{position:absolute;inset:0;pointer-events:none;z-index:30;background:#fff;opacity:0;transition:opacity .1s}
.flash.on{opacity:.55}
.flash.red{background:#ef4444}
.flash.gold{background:#fbbf24}
.dots{display:flex;justify-content:center;gap:7px;margin:4px 0 6px}
.dot{height:6px;border-radius:3px;transition:all .4s;box-shadow:0 0 6px rgba(0,0,0,.5)}
.card{background:rgba(10,8,26,.85);border:1px solid rgba(140,100,255,.18);border-radius:10px;padding:7px 11px;backdrop-filter:blur(6px)}
.card.phurt{background:rgba(239,68,68,.3)!important;transition:background .12s}
.logline{line-height:1.4}
.wordzone{display:flex;align-items:center;flex-wrap:wrap;gap:4px;min-height:50px;transition:border-color .2s}
.wordzone.active{border-color:rgba(251,191,36,.55)!important;box-shadow:0 0 14px rgba(251,191,36,.18)}
.lslot{display:inline-flex;align-items:center;justify-content:center;width:32px;height:38px;background:rgba(251,191,36,.15);border:1px solid rgba(251,191,36,.45);border-radius:6px;color:#fbbf24;font-family:'Cinzel',serif;font-size:17px;font-weight:700;box-shadow:0 0 10px rgba(251,191,36,.25)}
.tgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:8px}
.tile{height:54px;background:rgba(19,16,42,.9);border:2px solid rgba(85,66,170,.5);border-radius:10px;color:#c4b5fd;font-family:'Cinzel',serif;font-size:21px;font-weight:700;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none;backdrop-filter:blur(4px)}
.tile:hover:not(.sel){border-color:#7c5af5;background:rgba(28,24,64,.95);transform:translateY(-2px);box-shadow:0 4px 12px rgba(124,58,237,.35)}
.tile:active{transform:scale(.9)}
.tile.sel{background:rgba(251,191,36,.2);border-color:#f59e0b;color:#fbbf24;box-shadow:0 0 16px rgba(245,158,11,.55),inset 0 0 12px rgba(245,158,11,.25);opacity:.65}
.btn-row{display:flex;gap:7px}
.btn-clear{height:48px;border-radius:10px;background:rgba(10,8,26,.8);border:1px solid rgba(85,66,170,.4);color:#8076a8;font-family:'Cinzel',serif;font-size:14px;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;touch-action:manipulation;flex:1;backdrop-filter:blur(4px)}
.btn-clear:hover{border-color:#7c5af5;color:#c4b5fd}
.btn-cast{height:48px;border-radius:10px;border:none;font-family:'Cinzel',serif;font-size:16px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;touch-action:manipulation;flex:2.4}
.btn-cast.ready{background:linear-gradient(135deg,#7c3aed 0%,#4f46e5 100%);color:#fff;box-shadow:0 0 22px rgba(124,58,237,.6),inset 0 1px 0 rgba(255,255,255,.2)}
.btn-cast.ready:hover{box-shadow:0 0 36px rgba(124,58,237,.95);transform:translateY(-1px)}
.btn-cast.ready:active{transform:scale(.96)}
.btn-cast.off{background:rgba(19,16,42,.7);color:rgba(200,180,255,.2);cursor:not-allowed}
.result-content{position:relative;z-index:5;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:24px;text-align:center}
.result-content h2{font-family:'Cinzel',serif;font-size:32px;font-weight:900;margin-bottom:14px;letter-spacing:2px}
.result-content p{font-size:16px;line-height:1.6;margin-bottom:6px;color:#c4b5fd}
.scbtn{font-family:'Cinzel',serif;font-size:15px;font-weight:700;padding:14px 34px;border:none;border-radius:11px;cursor:pointer;margin-top:22px;background:linear-gradient(135deg,#7c3aed 0%,#4f46e5 100%);color:white;box-shadow:0 0 22px rgba(124,58,237,.55);-webkit-tap-highlight-color:transparent;touch-action:manipulation;letter-spacing:1px;transition:transform .15s}
.scbtn:hover{transform:translateY(-2px);box-shadow:0 0 32px rgba(124,58,237,.85)}
.scbtn:active{transform:scale(.95)}
@keyframes floatEmoji{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
.big-emoji{font-size:72px;margin-bottom:14px;animation:floatEmoji 2.3s ease-in-out infinite;filter:drop-shadow(0 8px 20px currentColor)}
@keyframes sparkle{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
.tier0{color:#64748b}.tier1{color:#60a5fa}.tier2{color:#fbbf24}.tier3{color:#f97316}.tier4{color:#a78bfa}
</style>
</head>
<body>
<div class="frame" id="frame">
  <button class="sound-btn" id="sbtn" data-a="sound">&#9835;</button>
  <div class="flash" id="flash"></div>
  <div class="screen" id="sBattle"></div>
  <div class="screen" id="sTrans"></div>
  <div class="screen" id="sDefeat"></div>
  <div class="screen" id="sWin"></div>
</div>
<script src="game.js"></script>
</body>
</html>
