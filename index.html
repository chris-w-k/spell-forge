<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#050410">
<title>Spell Forge — Word RPG</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9A%94%EF%B8%8F%3C/text%3E%3C/svg%3E">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#000;min-height:100vh;font-family:'Crimson Text',serif;display:flex;align-items:center;justify-content:center;overscroll-behavior:none}
.frame{position:relative;width:400px;height:820px;overflow:hidden;border-radius:28px;background:#050410;box-shadow:0 25px 80px rgba(88,28,200,.25),0 0 0 1px rgba(140,100,255,.18)}
@media (max-width:420px){.frame{width:100vw;height:100vh;border-radius:0}}
#three-container{position:absolute;top:58px;left:0;right:0;height:340px;z-index:0;overflow:hidden}
#three-container canvas{display:block;width:100%!important;height:100%!important}
.bottom-ui{position:absolute;top:398px;left:0;right:0;bottom:0;z-index:2;padding:0 12px;color:#e9e6ff;background:linear-gradient(to bottom,transparent 0%,rgba(5,4,16,.75) 8%,rgba(5,4,16,.95) 30%)}
.top-ui{position:absolute;top:0;left:0;right:0;z-index:2;padding:0 12px;color:#e9e6ff;background:linear-gradient(to bottom,rgba(5,4,16,.88) 0%,rgba(5,4,16,.65) 60%,transparent 100%);padding-bottom:8px}
.title{text-align:center;padding:10px 0 4px;font-family:'Cinzel',serif;font-size:10px;font-weight:700;letter-spacing:4px;text-transform:uppercase}
.mrow{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px;padding:0 2px;text-shadow:0 2px 8px rgba(0,0,0,.9)}
.mname{font-family:'Cinzel',serif;font-size:15px;font-weight:700;line-height:1.1}
.msub{font-size:10px;color:rgba(255,255,255,.55);margin-top:2px}
.hplabel{font-size:10px;color:rgba(255,255,255,.6)}
.hpt{height:7px;background:rgba(0,0,0,.65);border-radius:5px;overflow:hidden;border:1px solid rgba(255,255,255,.1);box-shadow:0 2px 8px rgba(0,0,0,.5)}
.hpf{height:100%;border-radius:5px;transition:width .4s,background .4s}
.atk-track{height:3px;background:rgba(0,0,0,.6);border-radius:2px;overflow:hidden;margin-top:2px}
.atk-fill{height:100%;background:#ef4444;border-radius:2px;box-shadow:0 0 6px #ef4444}
.dots{display:flex;justify-content:center;gap:7px;margin:8px 0 6px}
.dot{height:6px;border-radius:3px;transition:all .4s;box-shadow:0 0 6px rgba(0,0,0,.5)}
.card{background:rgba(10,8,26,.85);border:1px solid rgba(140,100,255,.22);border-radius:10px;padding:6px 11px;backdrop-filter:blur(8px)}
.card.phurt{background:rgba(239,68,68,.3)!important;transition:background .12s}
.logline{line-height:1.35}
.wordzone{display:flex;align-items:center;flex-wrap:wrap;gap:4px;min-height:48px}
.wordzone.active{border-color:rgba(251,191,36,.55)!important;box-shadow:0 0 14px rgba(251,191,36,.18)}
.lslot{display:inline-flex;align-items:center;justify-content:center;width:30px;height:36px;background:rgba(251,191,36,.2);border:1px solid rgba(251,191,36,.5);border-radius:6px;color:#fbbf24;font-family:'Cinzel',serif;font-size:16px;font-weight:700;box-shadow:0 0 10px rgba(251,191,36,.3)}
.tgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:7px}
.tile{height:50px;background:rgba(19,16,42,.92);border:2px solid rgba(85,66,170,.55);border-radius:10px;color:#c4b5fd;font-family:'Cinzel',serif;font-size:20px;font-weight:700;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none}
.tile:hover:not(.sel){border-color:#7c5af5;background:rgba(28,24,64,.95);transform:translateY(-2px)}
.tile:active{transform:scale(.9)}
.tile.sel{background:rgba(251,191,36,.22);border-color:#f59e0b;color:#fbbf24;box-shadow:0 0 18px rgba(245,158,11,.6);opacity:.7}
.btn-row{display:flex;gap:7px}
.btn-clear{height:46px;border-radius:10px;background:rgba(10,8,26,.8);border:1px solid rgba(85,66,170,.45);color:#8076a8;font-family:'Cinzel',serif;font-size:14px;cursor:pointer;flex:1}
.btn-clear:hover{border-color:#7c5af5;color:#c4b5fd}
.btn-cast{height:46px;border-radius:10px;border:none;font-family:'Cinzel',serif;font-size:15px;font-weight:700;letter-spacing:1px;cursor:pointer;flex:2.4;transition:all .2s}
.btn-cast.ready{background:linear-gradient(135deg,#7c3aed 0%,#4f46e5 100%);color:#fff;box-shadow:0 0 22px rgba(124,58,237,.65)}
.btn-cast.ready:hover{transform:translateY(-1px);box-shadow:0 0 38px rgba(124,58,237,1)}
.btn-cast.off{background:rgba(19,16,42,.7);color:rgba(200,180,255,.2);cursor:not-allowed}
.flash{position:absolute;inset:0;pointer-events:none;z-index:4;background:#fff;opacity:0;transition:opacity .1s}
.flash.on{opacity:.45}
.flash.red{background:#ef4444}.flash.gold{background:#fbbf24}
@keyframes floatNum{0%{transform:translateY(0) scale(1);opacity:1}60%{opacity:1}100%{transform:translateY(-80px) scale(.65);opacity:0}}
.fdmg{position:absolute;font-family:'Cinzel',serif;font-weight:900;pointer-events:none;animation:floatNum 1.5s ease-out forwards;text-shadow:0 0 14px currentColor,0 2px 6px rgba(0,0,0,.9);z-index:3}
.fx{position:absolute;top:58px;left:0;right:0;height:340px;pointer-events:none;z-index:3;overflow:hidden}
.screen{position:absolute;inset:0;z-index:5;opacity:0;pointer-events:none;transition:opacity .5s;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;background:radial-gradient(ellipse at 50% 40%,rgba(0,0,0,.6) 0%,rgba(5,4,16,.95) 70%)}
.screen.on{opacity:1;pointer-events:auto}
.screen h2{font-family:'Cinzel',serif;font-size:30px;font-weight:900;margin-bottom:14px;letter-spacing:2px}
.screen p{font-size:15px;line-height:1.6;margin-bottom:6px;color:#c4b5fd}
.scbtn{font-family:'Cinzel',serif;font-size:15px;font-weight:700;padding:14px 34px;border:none;border-radius:11px;cursor:pointer;margin-top:22px;background:linear-gradient(135deg,#7c3aed 0%,#4f46e5 100%);color:white;box-shadow:0 0 22px rgba(124,58,237,.6);letter-spacing:1px}
.big-emoji{font-size:64px;margin-bottom:12px}
.sound-btn{position:absolute;top:8px;right:14px;z-index:10;width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#c4b5fd;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif}
.tier0{color:#64748b}.tier1{color:#60a5fa}.tier2{color:#fbbf24}.tier3{color:#f97316}.tier4{color:#a78bfa}
</style>
</head>
<body>
<div class="frame" id="frame">
  <div id="three-container"></div>
  <div class="fx" id="fxlayer"></div>
  <div class="top-ui" id="topui"></div>
  <div class="bottom-ui" id="bottomui"></div>
  <div class="flash" id="flash"></div>
  <button class="sound-btn" id="sbtn" data-a="sound">&#9835;</button>
  <div class="screen" id="sTrans"></div>
  <div class="screen" id="sDefeat"></div>
  <div class="screen" id="sWin"></div>
</div>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module" src="game.js"></script>
</body>
</html>
