<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#FF6B35">
<title>WORDSLAP — Type to Slap!</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9C%8B%3C/text%3E%3C/svg%3E">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Bangers&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#000;min-height:100vh;font-family:'Crimson Text',serif;display:flex;align-items:center;justify-content:center;overscroll-behavior:none}
.frame{position:relative;width:400px;height:820px;overflow:hidden;border-radius:28px;background:#120c1f;box-shadow:0 25px 80px rgba(255,107,53,.25),0 0 0 1px rgba(251,191,36,.2)}
@media (max-width:420px){.frame{width:100vw;height:100vh;border-radius:0}}

/* Title screen */
#sTitle{position:absolute;inset:0;z-index:30;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;text-align:center;background:radial-gradient(ellipse at 50% 40%,#ff6b35 0%,#7a1d00 60%,#1a0a00 100%);transition:opacity .6s,transform .6s;opacity:1}
#sTitle.gone{opacity:0;transform:scale(.94);pointer-events:none}
.logo{font-family:'Bangers',cursive;font-size:72px;letter-spacing:4px;color:#fff;text-shadow:
  0 0 30px rgba(255,204,0,.9),
  4px 4px 0 #c41e3a,
  8px 8px 0 #000,
  0 0 60px rgba(255,107,53,.7);
  margin-bottom:0;line-height:0.9;animation:wobble 2s ease-in-out infinite}
@keyframes wobble{0%,100%{transform:rotate(-2deg) scale(1)}50%{transform:rotate(2deg) scale(1.03)}}
.subtitle{font-family:'Bangers',cursive;font-size:16px;letter-spacing:6px;color:#ffd700;margin-top:14px;margin-bottom:28px;text-shadow:2px 2px 0 #000}
.tagline{font-family:'Crimson Text',serif;font-size:16px;color:#fff;margin-bottom:36px;line-height:1.5;max-width:300px;font-weight:600;text-shadow:1px 1px 3px rgba(0,0,0,.8)}
.play-btn{font-family:'Bangers',cursive;font-size:22px;padding:16px 48px;border:3px solid #000;border-radius:14px;cursor:pointer;background:linear-gradient(135deg,#ffd700 0%,#ff9900 100%);color:#000;letter-spacing:3px;box-shadow:0 6px 0 #c41e3a,0 10px 20px rgba(0,0,0,.5);transition:transform .15s,box-shadow .15s}
.play-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 0 #c41e3a,0 12px 24px rgba(0,0,0,.6)}
.play-btn:active:not(:disabled){transform:translateY(3px);box-shadow:0 3px 0 #c41e3a,0 6px 12px rgba(0,0,0,.4)}
.play-btn:disabled{background:#555;color:#999;cursor:not-allowed;box-shadow:0 4px 0 #222;border-color:#333}
.loading-dots{display:flex;gap:6px;margin-top:20px;min-height:16px;justify-content:center}
.ldot{width:10px;height:10px;border-radius:50%;background:#ffd700;animation:bounce 0.9s ease-in-out infinite;box-shadow:0 0 10px rgba(255,215,0,.7)}
.ldot:nth-child(2){animation-delay:.15s;background:#ff9900}.ldot:nth-child(3){animation-delay:.3s;background:#ff6b35}
@keyframes bounce{0%,80%,100%{transform:scale(.4);opacity:.5}40%{transform:scale(1.2);opacity:1}}
.loading-text{font-family:'Bangers',cursive;font-size:14px;letter-spacing:2px;color:#ffd700;margin-top:16px;text-transform:uppercase;min-height:18px;text-shadow:1px 1px 2px #000}
.orb{position:absolute;border-radius:50%;filter:blur(1px);animation:float 6s ease-in-out infinite;pointer-events:none}
.orb.o1{width:100px;height:100px;background:radial-gradient(circle,rgba(255,215,0,.4),transparent 70%);top:8%;left:8%;animation-duration:5s}
.orb.o2{width:140px;height:140px;background:radial-gradient(circle,rgba(255,107,53,.35),transparent 70%);bottom:10%;right:8%;animation-duration:7s;animation-delay:-1s}
.orb.o3{width:80px;height:80px;background:radial-gradient(circle,rgba(255,153,0,.3),transparent 70%);top:45%;right:15%;animation-duration:4s;animation-delay:-3s}
@keyframes float{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(20px,-15px) scale(1.1)}66%{transform:translate(-15px,10px) scale(.9)}}
.key-hint{position:absolute;bottom:20px;font-size:10px;color:#ffd700;letter-spacing:2px;font-family:'Bangers',cursive;text-align:center;width:100%;text-shadow:1px 1px 2px #000}
.hand-emoji{font-size:80px;margin-bottom:8px;animation:slap 1.8s ease-in-out infinite;display:block}
@keyframes slap{0%,90%,100%{transform:rotate(0deg) scale(1)}20%{transform:rotate(-25deg) scale(1.2)}40%{transform:rotate(30deg) scale(1.4)}50%{transform:rotate(-10deg) scale(1.3)}}

/* Game UI */
#three-container{position:absolute;top:58px;left:0;right:0;height:340px;z-index:0;overflow:hidden}
#three-container canvas{display:block;width:100%!important;height:100%!important}
.bottom-ui{position:absolute;top:398px;left:0;right:0;bottom:0;z-index:2;padding:0 12px;color:#fff;background:linear-gradient(to bottom,transparent 0%,rgba(20,8,30,.8) 8%,rgba(20,8,30,.96) 30%)}
.top-ui{position:absolute;top:0;left:0;right:0;z-index:2;padding:0 12px;color:#fff;background:linear-gradient(to bottom,rgba(20,8,30,.9) 0%,rgba(20,8,30,.65) 60%,transparent 100%);padding-bottom:8px}
.title{text-align:center;padding:10px 0 4px;font-family:'Bangers',cursive;font-size:12px;letter-spacing:4px;color:#ffd700;text-shadow:1px 1px 0 #c41e3a}
.mrow{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px;padding:0 2px;text-shadow:0 2px 8px rgba(0,0,0,.9)}
.mname{font-family:'Bangers',cursive;font-size:20px;line-height:1;letter-spacing:1px}
.msub{font-size:10px;color:rgba(255,255,255,.65);margin-top:3px;font-family:'Crimson Text',serif}
.hplabel{font-size:11px;color:#ffd700;font-family:'Bangers',cursive;letter-spacing:1px}
.hpt{height:9px;background:rgba(0,0,0,.7);border-radius:5px;overflow:hidden;border:1px solid rgba(255,215,0,.3);box-shadow:0 2px 8px rgba(0,0,0,.5)}
.hpf{height:100%;border-radius:5px;transition:width .3s,background .4s}
.atk-track{height:3px;background:rgba(0,0,0,.6);border-radius:2px;overflow:hidden;margin-top:2px}
.atk-fill{height:100%;background:#ef4444;border-radius:2px;box-shadow:0 0 6px #ef4444}
.card{background:rgba(25,15,45,.88);border:1px solid rgba(255,215,0,.22);border-radius:10px;padding:7px 11px;backdrop-filter:blur(8px)}
.card.phurt{background:rgba(239,68,68,.35)!important;transition:background .12s;border-color:#ef4444}
.logline{line-height:1.35}
.wordzone{display:flex;align-items:center;flex-wrap:wrap;gap:4px;min-height:48px}
.wordzone.active{border-color:rgba(255,215,0,.7)!important;box-shadow:0 0 16px rgba(255,215,0,.25)}
.lslot{display:inline-flex;align-items:center;justify-content:center;width:30px;height:36px;background:rgba(255,215,0,.22);border:1px solid rgba(255,215,0,.55);border-radius:6px;color:#ffd700;font-family:'Bangers',cursive;font-size:20px;box-shadow:0 0 10px rgba(255,215,0,.35)}
.tgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:7px}
.tile{height:52px;background:rgba(25,15,45,.92);border:2px solid rgba(255,107,53,.5);border-radius:10px;color:#ffd700;font-family:'Bangers',cursive;font-size:24px;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none;letter-spacing:1px}
.tile:hover:not(.sel){border-color:#ff9900;background:rgba(40,20,60,.95);transform:translateY(-2px);box-shadow:0 4px 12px rgba(255,153,0,.3)}
.tile:active,.tile.keypress{transform:scale(.88);background:rgba(255,215,0,.35);border-color:#ffd700;color:#fff}
.tile.sel{background:rgba(255,215,0,.25);border-color:#ffd700;color:#fff;box-shadow:0 0 18px rgba(255,215,0,.6);opacity:.8}
.btn-row{display:flex;gap:7px}
.btn-clear{height:50px;border-radius:10px;background:rgba(25,15,45,.8);border:2px solid rgba(255,107,53,.4);color:#ff9900;font-family:'Bangers',cursive;font-size:15px;letter-spacing:2px;cursor:pointer;flex:1}
.btn-clear:hover{border-color:#ff9900;color:#ffd700}
.btn-cast{height:50px;border-radius:10px;border:2px solid #000;font-family:'Bangers',cursive;font-size:22px;letter-spacing:3px;cursor:pointer;flex:2.4;transition:all .15s}
.btn-cast.ready{background:linear-gradient(135deg,#ffd700 0%,#ff6b35 100%);color:#000;box-shadow:0 4px 0 #c41e3a,0 0 22px rgba(255,215,0,.6)}
.btn-cast.ready:hover{transform:translateY(-1px);box-shadow:0 5px 0 #c41e3a,0 0 30px rgba(255,215,0,.9)}
.btn-cast.ready:active{transform:translateY(3px);box-shadow:0 1px 0 #c41e3a,0 0 15px rgba(255,215,0,.4)}
.btn-cast.off{background:rgba(40,20,50,.8);color:rgba(255,215,0,.2);cursor:not-allowed;box-shadow:0 3px 0 rgba(0,0,0,.3)}
.flash{position:absolute;inset:0;pointer-events:none;z-index:4;background:#fff;opacity:0;transition:opacity .1s}
.flash.on{opacity:.45}
.flash.red{background:#ef4444}.flash.gold{background:#ffd700}
@keyframes floatNum{0%{transform:translateY(0) scale(1);opacity:1}60%{opacity:1}100%{transform:translateY(-80px) scale(.65);opacity:0}}
.fdmg{position:absolute;font-family:'Bangers',cursive;font-weight:400;pointer-events:none;animation:floatNum 1.5s ease-out forwards;text-shadow:0 0 14px currentColor,0 2px 6px rgba(0,0,0,.9);z-index:3;letter-spacing:1px}
.fx{position:absolute;top:58px;left:0;right:0;height:340px;pointer-events:none;z-index:3;overflow:hidden}
.screen{position:absolute;inset:0;z-index:5;opacity:0;pointer-events:none;transition:opacity .5s;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;background:radial-gradient(ellipse at 50% 40%,rgba(0,0,0,.55) 0%,rgba(20,8,30,.96) 70%)}
.screen.on{opacity:1;pointer-events:auto}
.screen h2{font-family:'Bangers',cursive;font-size:44px;letter-spacing:3px;margin-bottom:14px;text-shadow:3px 3px 0 #c41e3a,6px 6px 0 #000}
.screen p{font-size:15px;line-height:1.7;margin-bottom:6px;color:#fff;font-family:'Crimson Text',serif}
.scbtn{font-family:'Bangers',cursive;font-size:18px;padding:14px 34px;border:2px solid #000;border-radius:11px;cursor:pointer;margin-top:22px;background:linear-gradient(135deg,#ffd700 0%,#ff6b35 100%);color:#000;box-shadow:0 5px 0 #c41e3a,0 8px 18px rgba(255,107,53,.5);letter-spacing:2px}
.scbtn:hover{transform:translateY(-1px);box-shadow:0 6px 0 #c41e3a,0 10px 22px rgba(255,107,53,.7)}
.scbtn:active{transform:translateY(3px);box-shadow:0 2px 0 #c41e3a}
.big-emoji{font-size:72px;margin-bottom:12px}
.sound-btn{position:absolute;top:8px;right:14px;z-index:10;width:30px;height:30px;border-radius:50%;background:rgba(255,215,0,.15);border:1px solid rgba(255,215,0,.35);color:#ffd700;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'Bangers',cursive}
.tier0{color:#64748b}.tier1{color:#60a5fa}.tier2{color:#fbbf24}.tier3{color:#f97316}.tier4{color:#a78bfa}
</style>
</head>
<body>
<div class="frame" id="frame">
  <div id="sTitle">
    <div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div>
    <div style="position:relative;z-index:2">
      <span class="hand-emoji">✋</span>
      <div class="logo">WORDSLAP</div>
      <div class="subtitle">TYPE TO SLAP</div>
      <div class="tagline">Spell English words.<br>Slap silly animals.<br><em style="color:#ffd700">(It's educational!)</em></div>
      <button class="play-btn" id="playBtn" data-a="play" disabled>LOADING…</button>
      <div class="loading-dots" id="ldots"><div class="ldot"></div><div class="ldot"></div><div class="ldot"></div></div>
      <div class="loading-text" id="ltext">Wrangling animals…</div>
    </div>
    <div class="key-hint">press <span style="color:#fff">ENTER</span> or <span style="color:#fff">SPACE</span> to begin</div>
  </div>

  <div id="three-container"></div>
  <div class="fx" id="fxlayer"></div>
  <div class="top-ui" id="topui"></div>
  <div class="bottom-ui" id="bottomui"></div>
  <div class="flash" id="flash"></div>
  <button class="sound-btn" id="sbtn" data-a="sound">&#9835;</button>
  <div class="screen" id="sTrans"></div>
  <div class="screen" id="sDefeat"></div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module" src="game.js"></script>
</body>
</html>
